<!DOCTYPE html>
<html lang="en">
<head>

        <div class="cell"><img src="images 3/12.jpeg"><span class="tick">✔</span></div>

        <div class="cell"><img src="images 3/14.jpeg"><span class="tick">✔</span></div>

        <div class="cell"><img src="images 3/15.jpeg"><span class="tick">✔</span></div>
        <div class="cell"><img src="images 3/2.jpeg"><span class="tick">✔</span></div>
        <div class="cell"><img src="images 3/3.jpeg"><span class="tick">✔</span></div>

    </div>

    <button class="verify-btn">VERIFY</button>

</div>

</html>
